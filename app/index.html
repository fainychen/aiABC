<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孩童 ABC 英文練習書寫板 - AI 老師版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            touch-action: none;
        }
        .canvas-container {
            position: relative;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        #drawingCanvas {
            cursor: crosshair;
            display: block;
        }
        .letter-btn.active {
            background-color: #f59e0b;
            color: white;
            transform: scale(1.1);
        }
        .guide-line {
            pointer-events: none;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 300px;
            color: rgba(0, 0, 0, 0.05);
            font-weight: bold;
            user-select: none;
        }
        /* 載入動畫 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <!-- 標題區 -->
    <header class="text-center mb-6">
        <h1 class="text-4xl font-bold text-blue-600 mb-2">✨ ABC AI 練習老師 ✨</h1>
        <p class="text-gray-600">寫完字母後，按「檢查看看」讓 AI 老師幫你打分數吧！</p>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row gap-6 max-w-6xl mx-auto w-full">
        
        <!-- 左側字母選擇器 -->
        <div class="lg:w-1/4 bg-white p-4 rounded-3xl shadow-sm border border-blue-100 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg text-blue-500">字母表</h2>
                <button id="toggleCase" class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-sm font-bold hover:bg-blue-200">
                    大小寫
                </button>
            </div>
            <div id="letterGrid" class="grid grid-cols-4 md:grid-cols-5 lg:grid-cols-3 gap-2 overflow-y-auto max-h-[300px] lg:max-h-none pr-2"></div>
        </div>

        <!-- 中央書寫區域 -->
        <div class="flex-grow flex flex-col gap-4">
            <div class="canvas-container flex-grow min-h-[400px]">
                <div id="guideText" class="guide-line">A</div>
                <canvas id="drawingCanvas"></canvas>
            </div>

            <!-- 控制面板 -->
            <div class="bg-white p-4 rounded-3xl shadow-md border border-blue-500 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <span class="text-gray-500 text-sm font-bold">顏色:</span>
                        <div class="flex gap-2" id="colorPicker">
                            <button class="w-8 h-8 rounded-full bg-blue-500 ring-2 ring-offset-2 ring-blue-500" data-color="#3b82f6"></button>
                            <button class="w-8 h-8 rounded-full bg-red-500" data-color="#ef4444"></button>
                            <button class="w-8 h-8 rounded-full bg-green-500" data-color="#22c55e"></button>
                            <button class="w-8 h-8 rounded-full bg-purple-500" data-color="#a855f7"></button>
                        </div>
                    </div>
                    <div class="h-8 w-[1px] bg-gray-200 mx-2"></div>
                    <div class="flex items-center gap-2">
                        <input type="range" id="lineWidth" min="5" max="30" value="15" class="w-20 accent-blue-500">
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="clearCanvas" class="px-4 py-2 bg-pink-100 text-pink-600 font-bold rounded-2xl hover:bg-pink-200 transition-colors">
                        重寫
                    </button>
                    <button id="checkBtn" class="px-6 py-2 bg-yellow-400 text-yellow-900 font-bold rounded-2xl hover:bg-yellow-500 transition-colors shadow-lg flex items-center gap-2">
                        <span>檢查看看</span>
                        <div id="checkSpinner" class="loader hidden"></div>
                    </button>
                    <button id="downloadBtn" class="p-2 bg-blue-100 text-blue-600 rounded-2xl hover:bg-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- AI 評分彈窗 -->
    <div id="resultModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform transition-all scale-90 opacity-0" id="modalContent">
            <div id="resultIcon" class="text-6xl mb-4">🌟</div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2" id="resultTitle">非常棒！</h3>
            <div class="text-5xl font-black text-orange-500 mb-4" id="resultScore">95</div>
            <p class="text-gray-600 mb-6" id="resultFeedback">你的字母寫得很標準，線條很流暢，繼續保持喔！</p>
            <button id="closeModal" class="w-full py-3 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 shadow-lg">
                我知道了
            </button>
        </div>
    </div>

    <script>
        const apiKey = "";
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const letterGrid = document.getElementById('letterGrid');
        const guideText = document.getElementById('guideText');
        const clearBtn = document.getElementById('clearCanvas');
        const checkBtn = document.getElementById('checkBtn');
        const checkSpinner = document.getElementById('checkSpinner');
        const downloadBtn = document.getElementById('downloadBtn');
        const toggleCaseBtn = document.getElementById('toggleCase');
        const resultModal = document.getElementById('resultModal');
        const modalContent = document.getElementById('modalContent');
        const colorButtons = document.querySelectorAll('#colorPicker button');
        const lineWidthInput = document.getElementById('lineWidth');

        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let currentLetter = 'A';
        let isUpperCase = true;
        let currentColor = '#3b82f6';
        let currentLineWidth = 15;

        function initLetters() {
            letterGrid.innerHTML = '';
            for (let i = 65; i <= 90; i++) {
                const char = String.fromCharCode(i);
                const displayChar = isUpperCase ? char : char.toLowerCase();
                const btn = document.createElement('button');
                btn.className = `letter-btn p-3 rounded-2xl border-2 border-gray-100 font-bold text-2xl hover:border-blue-300 ${displayChar === currentLetter ? 'active' : 'bg-gray-50'}`;
                btn.innerText = displayChar;
                btn.onclick = () => selectLetter(displayChar);
                letterGrid.appendChild(btn);
            }
        }

        function selectLetter(letter) {
            currentLetter = letter;
            guideText.innerText = letter;
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === letter);
            });
            clearCanvas();
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getMousePos(e);
            [lastX, lastY] = [pos.x, pos.y];
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentLineWidth;
            ctx.stroke();
            [lastX, lastY] = [pos.x, pos.y];
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // AI 檢查邏輯
        async function checkHandwriting() {
            if (checkBtn.disabled) return;
            
            // 檢查畫布是否為空
            const pixelData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const hasDrawing = Array.from(pixelData).some(p => p !== 0);
            if (!hasDrawing) {
                alert("請先在畫板上寫字喔！");
                return;
            }

            checkBtn.disabled = true;
            checkSpinner.classList.remove('hidden');

            try {
                // 準備圖片數據
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tCtx = tempCanvas.getContext('2d');
                tCtx.fillStyle = 'white';
                tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                tCtx.drawImage(canvas, 0, 0);
                const base64Image = tempCanvas.toDataURL('image/png').split(',')[1];

                const prompt = `你是一個溫柔的國小英文老師。
                請判斷這張圖片中手寫的字母是否為 "${currentLetter}"。
                請以 JSON 格式回應，包含：
                1. isCorrect (boolean)
                2. score (number, 0-100)
                3. feedback (string, 繁體中文，給小孩的鼓勵性評論，約30字)
                4. emoji (string, 代表結果的表情符號)`;

                let result;
                let retries = 0;
                const maxRetries = 5;

                while (retries <= maxRetries) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    role: "user",
                                    parts: [
                                        { text: prompt },
                                        { inlineData: { mimeType: "image/png", data: base64Image } }
                                    ]
                                }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        if (!response.ok) throw new Error('API Error');
                        const data = await response.json();
                        result = JSON.parse(data.candidates[0].content.parts[0].text);
                        break;
                    } catch (err) {
                        if (retries === maxRetries) throw err;
                        const delay = Math.pow(2, retries) * 1000;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        retries++;
                    }
                }

                showResult(result);
            } catch (error) {
                console.error(error);
                alert("老師現在有點忙，請等一下再試試看！");
            } finally {
                checkBtn.disabled = false;
                checkSpinner.classList.add('hidden');
            }
        }

        function showResult(data) {
            document.getElementById('resultIcon').innerText = data.emoji || (data.score > 80 ? '🌟' : '💪');
            document.getElementById('resultTitle').innerText = data.score > 80 ? '太棒了！' : '加油喔！';
            document.getElementById('resultScore').innerText = data.score;
            document.getElementById('resultFeedback').innerText = data.feedback;
            
            resultModal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-90', 'opacity-0');
            }, 10);
        }

        // 事件綁定
        window.addEventListener('load', () => { initLetters(); resizeCanvas(); });
        window.addEventListener('resize', resizeCanvas);
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', () => isDrawing = false);

        clearBtn.onclick = clearCanvas;
        checkBtn.onclick = checkHandwriting;
        
        document.getElementById('closeModal').onclick = () => {
            modalContent.classList.add('scale-90', 'opacity-0');
            setTimeout(() => resultModal.classList.add('hidden'), 200);
        };

        toggleCaseBtn.onclick = () => {
            isUpperCase = !isUpperCase;
            currentLetter = isUpperCase ? currentLetter.toUpperCase() : currentLetter.toLowerCase();
            initLetters();
            selectLetter(currentLetter);
        };

        colorButtons.forEach(btn => {
            btn.onclick = () => {
                colorButtons.forEach(b => b.classList.remove('ring-2', 'ring-offset-2', 'ring-blue-500'));
                btn.classList.add('ring-2', 'ring-offset-2', 'ring-blue-500');
                currentColor = btn.dataset.color;
            };
        });

        lineWidthInput.oninput = (e) => currentLineWidth = e.target.value;

        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `writing-${currentLetter}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };
    </script>
</body>
</html>
